name: mediflow
description: A skeuomorphic medical management application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  supabase_flutter: ^2.6.0
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0
  image_picker: ^1.2.1
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  flutter_local_notifications: ^17.1.2
  connectivity_plus: ^6.0.3
  permission_handler: ^12.0.1
  share_plus: ^12.0.2
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
